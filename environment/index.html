// ── AUDIO ENGINE ────────────────────────────────────────────────────
var _AC=null;
function _getAC(){
  if(!_AC) _AC=new(window.AudioContext||window.webkitAudioContext)();
  return _AC;
}
function _withAC(fn){
  try{
    var ac=_getAC();
    if(ac.state==='suspended'){ac.resume().then(function(){fn(ac);});}
    else{fn(ac);}
  }catch(e){console.warn('Audio error:',e);}
}

// Karplus-Strong helper — plucked string
function _ks(ac,freq,amp,when){
  var sr=ac.sampleRate, p=Math.round(sr/freq), len=sr*2;
  var buf=ac.createBuffer(1,len,sr), d=buf.getChannelData(0);
  for(var j=0;j<p;j++) d[j]=(Math.random()*2-1)*amp;
  for(var j=p;j<len;j++) d[j]=0.499*(d[j-p]+d[j-p+1]);
  var src=ac.createBufferSource(); src.buffer=buf;
  src.connect(ac.destination);
  src.start(when||0);
}

window._playGuitar=function(){
  _withAC(function(ac){
    var notes=[82.4,110,146.8,196,246.9,329.6];
    var now=ac.currentTime;
    notes.forEach(function(f,i){ _ks(ac,f,0.65-i*0.04,now+i*0.048); });
  });
};

window._playAccordion=function(){
  _withAC(function(ac){
    var chords=[[196,246.9,293.7,392],[261.6,329.6,392,523.3]];
    var chord=chords[Math.floor(Math.random()*2)];
    var now=ac.currentTime;
    chord.forEach(function(freq){
      var osc=ac.createOscillator(),lfo=ac.createOscillator();
      var lfoG=ac.createGain(),envG=ac.createGain();
      osc.type='sawtooth'; osc.frequency.value=freq;
      lfo.type='sine'; lfo.frequency.value=5.8; lfoG.gain.value=6;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      envG.gain.setValueAtTime(0,now);
      envG.gain.linearRampToValueAtTime(0.1,now+0.08);
      envG.gain.setValueAtTime(0.1,now+1.0);
      envG.gain.exponentialRampToValueAtTime(0.0001,now+2.5);
      osc.connect(envG); envG.connect(ac.destination);
      lfo.start(now); osc.start(now);
      lfo.stop(now+2.5); osc.stop(now+2.5);
    });
  });
};

window._playSwish=function(){
  _withAC(function(ac){
    var now=ac.currentTime;
    // launch thud
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(130,now); o.frequency.exponentialRampToValueAtTime(45,now+0.15);
    g.gain.setValueAtTime(0.6,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.connect(g); g.connect(ac.destination); o.start(now); o.stop(now+0.2);
    // net swish after ball travels
    setTimeout(function(){
      _withAC(function(ac2){
        var sr=ac2.sampleRate, len=Math.round(sr*0.4);
        var buf=ac2.createBuffer(1,len,sr), d=buf.getChannelData(0);
        for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
        var src=ac2.createBufferSource(); src.buffer=buf;
        var bpf=ac2.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=3500; bpf.Q.value=0.8;
        var sg=ac2.createGain(); sg.gain.value=0.3;
        src.connect(bpf); bpf.connect(sg); sg.connect(ac2.destination); src.start();
      });
    },1800); // longer delay — ball now travels further
  });
};

window._playBounce=function(){
  _withAC(function(ac){
    var now=ac.currentTime;
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(160,now); o.frequency.exponentialRampToValueAtTime(50,now+0.14);
    g.gain.setValueAtTime(0.5,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.connect(g); g.connect(ac.destination); o.start(now); o.stop(now+0.2);
  });
};

  var h=window._suit1,h2=window._suit2,g=window._globe,ar=window._arcRing;
  if(h){h.position.y=Math.sin(t*0.5)*0.06;}
  if(h2){h2.position.y=Math.sin(t*0.5+Math.PI)*0.06;}
  if(g){
    g.rotation.y+=0.003;
    g.userData.orbitAngle=(g.userData.orbitAngle||0)+0.018;
    var a=g.userData.orbitAngle;
    if(g.userData.orbitDot)g.userData.orbitDot.position.set(Math.cos(a)*1.9*Math.cos(Math.PI/4),Math.sin(a)*1.9*Math.sin(Math.PI/4),Math.sin(a)*1.9*Math.cos(Math.PI/4));
  }
  if(ar)ar.material.opacity=0.08+Math.sin(t*1.8)*0.04;
  var vw=window._valWin;
  if(vw){vw.shaftMat.opacity=0.035+Math.sin(t*0.4)*0.015; vw.winPt.intensity=1.6+Math.sin(t*0.6)*0.3;}
  // basketball — bounce idle or shoot animation
  var bb=window._bball, ss=window._shootState;
  if(bb){
    if(ss){
      ss.t+=0.018;
      var u=Math.min(ss.t,1);
      if(ss.phase==='up'){
        // parabolic arc to hoop
        var px=ss.start.x+(ss.target.x-ss.start.x)*u;
        var py=ss.start.y+(ss.target.y-ss.start.y)*u+5*u*(1-u)*2.2;
        var pz=ss.start.z+(ss.target.z-ss.start.z)*u;
        bb.position.set(px,py,pz); bb.rotation.z+=0.14;
        if(ss.t>=1){ ss.phase='down'; ss.t=0; }
      } else {
        // fall back to origin
        var op=bb.userData.origPos;
        var px2=ss.target.x+(op.x-ss.target.x)*u;
        var py2=ss.target.y+(op.y-ss.target.y)*u - 1.5*u*(1-u)*1.5;
        var pz2=ss.target.z+(op.z-ss.target.z)*u;
        bb.position.set(px2,py2,pz2); bb.rotation.z+=0.08;
        if(ss.t>=0.85&&ss.t-0.018<0.85) window._playBounce&&window._playBounce();
        if(ss.t>=1){ bb.position.set(op.x,op.y,op.z); window._shootState=null; }
      }
    } else {
      var by=Math.abs(Math.sin(t*2.2))*1.0; bb.position.y=0.35+by; bb.rotation.z+=0.025;
    }
  }
  keyLight.intensity=(darkMode?2.5:1.2)+Math.sin(t*2.3)*0.12;
  renderer.render(scene,camera);
}
setTimeout(function(){
  var L=document.getElementById('loading');
  L.style.opacity='0';
  setTimeout(function(){L.style.display='none';animate();},900);
},400);
window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
